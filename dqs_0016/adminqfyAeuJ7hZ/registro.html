<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .login-container { /* Renombrado de 'login-container' a 'form-container' si quieres ser más genérico, pero 'login-container' funciona para registro también */
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .login-container h1 {
            color: #333;
            margin-bottom: 20px;
        }
        /* No hay ".error" aquí porque registro.html no maneja errores de PHP directamente como login.php */
        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-form label {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }
        .login-form input {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        .login-form .button { /* Clase 'button' en lugar de 'submit' directamente para consistencia */
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
        }
        .login-form .button:hover {
            background-color: #45a049;
        }
        @media (max-width: 600px) {
            .login-container {
                width: 90%;
                margin: 20px auto;
                padding: 15px;
            }
            .login-form input {
                padding: 8px;
            }
            .login-form .button {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Registro de Usuario</h1>
        <form action="registrar_usuario.php" method="post" class="login-form">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit" class="button">Registrar</button> </form>
    </div>
</body>
</html>
